name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "assertions/**"
      - "eslint-plugin-xframework/**"
      - "framework/**"
      - "pages/**"
      - "tests/**"
      - ".env.example"
      - "eslint.config.js"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "tsconfig.json"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/ci.yml"
      - "assertions/**"
      - "eslint-plugin-xframework/**"
      - "framework/**"
      - "pages/**"
      - "tests/**"
      - ".env.example"
      - "eslint.config.js"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "tsconfig.json"

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    env:
      BASE_URL: https://automationexercise.com
    steps:
      - uses: actions/checkout@v5
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-
      - name: Install system tools
        run: apt-get update -qq && apt-get install -y -q default-jre-headless git
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          format_duration() {
            local total_seconds="$1"
            printf '%dm %02ds' "$((total_seconds / 60))" "$((total_seconds % 60))"
          }

          start_epoch=$(date +%s)

          set +e
          npm run typecheck
          check_exit_code=$?
          set -e

          end_epoch=$(date +%s)
          duration_seconds=$((end_epoch - start_epoch))
          result="passed"

          if [ "$check_exit_code" -ne 0 ]; then
            result="failed"
          fi

          {
            echo "exit_code=$check_exit_code"
            echo "result=$result"
            echo "duration_seconds=$duration_seconds"
            echo "duration_human=$(format_duration "$duration_seconds")"
          } >> "$GITHUB_OUTPUT"

          exit 0
      - name: Lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          format_duration() {
            local total_seconds="$1"
            printf '%dm %02ds' "$((total_seconds / 60))" "$((total_seconds % 60))"
          }

          start_epoch=$(date +%s)

          set +e
          npm run lint
          check_exit_code=$?
          set -e

          end_epoch=$(date +%s)
          duration_seconds=$((end_epoch - start_epoch))
          result="passed"

          if [ "$check_exit_code" -ne 0 ]; then
            result="failed"
          fi

          {
            echo "exit_code=$check_exit_code"
            echo "result=$result"
            echo "duration_seconds=$duration_seconds"
            echo "duration_human=$(format_duration "$duration_seconds")"
          } >> "$GITHUB_OUTPUT"

          exit 0
      - name: Run unit tests
        id: unit
        continue-on-error: true
        shell: bash
        run: |
          format_duration() {
            local total_seconds="$1"
            printf '%dm %02ds' "$((total_seconds / 60))" "$((total_seconds % 60))"
          }

          start_epoch=$(date +%s)
          rm -rf playwright-report allure-results test-results .ci-reports/unit
          mkdir -p .ci-reports/unit

          set +e
          npm run test:unit
          test_exit_code=$?
          set -e

          end_epoch=$(date +%s)
          duration_seconds=$((end_epoch - start_epoch))
          result="passed"

          if [ "$test_exit_code" -ne 0 ]; then
            result="failed"
          fi

          if [ -d playwright-report ]; then
            mv playwright-report .ci-reports/unit/playwright-report
          fi

          if [ -d allure-results ] && [ -n "$(find allure-results -type f -print -quit)" ]; then
            npx allure generate allure-results --clean -o .ci-reports/unit/allure-report
          fi

          {
            echo "exit_code=$test_exit_code"
            echo "result=$result"
            echo "duration_seconds=$duration_seconds"
            echo "duration_human=$(format_duration "$duration_seconds")"
          } >> "$GITHUB_OUTPUT"

          exit 0
      - name: Upload unit Playwright report
        id: unit-playwright-report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-playwright-report
          path: .ci-reports/unit/playwright-report
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload unit Allure report
        id: unit-allure-report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-allure-report
          path: .ci-reports/unit/allure-report
          if-no-files-found: ignore
          retention-days: 14
      - name: Run UI tests
        id: ui
        continue-on-error: true
        shell: bash
        run: |
          format_duration() {
            local total_seconds="$1"
            printf '%dm %02ds' "$((total_seconds / 60))" "$((total_seconds % 60))"
          }

          start_epoch=$(date +%s)
          rm -rf playwright-report allure-results test-results .ci-reports/ui
          mkdir -p .ci-reports/ui

          set +e
          npm run test:ui
          test_exit_code=$?
          set -e

          end_epoch=$(date +%s)
          duration_seconds=$((end_epoch - start_epoch))
          result="passed"

          if [ "$test_exit_code" -ne 0 ]; then
            result="failed"
          fi

          if [ -d playwright-report ]; then
            mv playwright-report .ci-reports/ui/playwright-report
          fi

          if [ -d allure-results ] && [ -n "$(find allure-results -type f -print -quit)" ]; then
            npx allure generate allure-results --clean -o .ci-reports/ui/allure-report
          fi

          {
            echo "exit_code=$test_exit_code"
            echo "result=$result"
            echo "duration_seconds=$duration_seconds"
            echo "duration_human=$(format_duration "$duration_seconds")"
          } >> "$GITHUB_OUTPUT"

          exit 0
      - name: Upload UI Playwright report
        id: ui-playwright-report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-playwright-report
          path: .ci-reports/ui/playwright-report
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload UI Allure report
        id: ui-allure-report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-allure-report
          path: .ci-reports/ui/allure-report
          if-no-files-found: ignore
          retention-days: 14
      - name: Prepare GitHub Pages deployment
        id: pages
        if: always()
        shell: bash
        run: |
          PAGES_BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          mkdir -p .gh-pages/unit/${{ github.run_id }}
          mkdir -p .gh-pages/ui/${{ github.run_id }}

          if [ -d .ci-reports/unit/allure-report ]; then
            cp -r .ci-reports/unit/allure-report/. .gh-pages/unit/${{ github.run_id }}/
            echo "unit_url=${PAGES_BASE}/unit/${{ github.run_id }}/" >> "$GITHUB_OUTPUT"
          fi

          if [ -d .ci-reports/ui/allure-report ]; then
            cp -r .ci-reports/ui/allure-report/. .gh-pages/ui/${{ github.run_id }}/
            echo "ui_url=${PAGES_BASE}/ui/${{ github.run_id }}/" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .gh-pages
          keep_files: true
          allow_empty_commit: false
      - name: Write test summary
        if: always()
        shell: bash
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TYPECHECK_RESULT: ${{ steps.typecheck.outputs.result }}
          TYPECHECK_DURATION: ${{ steps.typecheck.outputs.duration_human }}
          LINT_RESULT: ${{ steps.lint.outputs.result }}
          LINT_DURATION: ${{ steps.lint.outputs.duration_human }}
          UNIT_RESULT: ${{ steps.unit.outputs.result }}
          UNIT_DURATION: ${{ steps.unit.outputs.duration_human }}
          UNIT_PLAYWRIGHT_URL: ${{ steps.unit-playwright-report.outputs.artifact-url }}
          UNIT_ALLURE_URL: ${{ steps.pages.outputs.unit_url }}
          UI_RESULT: ${{ steps.ui.outputs.result }}
          UI_DURATION: ${{ steps.ui.outputs.duration_human }}
          UI_PLAYWRIGHT_URL: ${{ steps.ui-playwright-report.outputs.artifact-url }}
          UI_ALLURE_URL: ${{ steps.pages.outputs.ui_url }}
        run: |
          format_links() {
            local playwright_url="$1"
            local allure_url="$2"
            local links=()

            if [ -n "$playwright_url" ]; then
              links+=("[HTML report]($playwright_url)")
            fi

            if [ -n "$allure_url" ]; then
              links+=("[Allure report]($allure_url)")
            fi

            if [ "${#links[@]}" -eq 0 ]; then
              echo "No artifact"
              return
            fi

            local joined_links="${links[0]}"

            for link in "${links[@]:1}"; do
              joined_links="$joined_links · $link"
            done

            echo "$joined_links"
          }

          format_result() {
            case "$1" in
              passed) echo "✅ Passed" ;;
              failed) echo "❌ Failed" ;;
              *) echo "⚪ Unknown" ;;
            esac
          }

          {
            echo "## CI run summary"
            echo
            echo "| Check | Result | Total time execution | Report link |"
            echo "| --- | --- | --- | --- |"
            echo "| Typecheck | $(format_result "${TYPECHECK_RESULT:-unknown}") | ${TYPECHECK_DURATION:-n/a} | n/a |"
            echo "| Lint | $(format_result "${LINT_RESULT:-unknown}") | ${LINT_DURATION:-n/a} | n/a |"
            echo "| Unit tests | $(format_result "${UNIT_RESULT:-unknown}") | ${UNIT_DURATION:-n/a} | $(format_links "$UNIT_PLAYWRIGHT_URL" "$UNIT_ALLURE_URL") |"
            echo "| UI tests | $(format_result "${UI_RESULT:-unknown}") | ${UI_DURATION:-n/a} | $(format_links "$UI_PLAYWRIGHT_URL" "$UI_ALLURE_URL") |"
            echo
            echo "Run: [#${{ github.run_number }}](${RUN_URL})"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Comment PR with test summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TYPECHECK_RESULT: ${{ steps.typecheck.outputs.result }}
          TYPECHECK_DURATION: ${{ steps.typecheck.outputs.duration_human }}
          LINT_RESULT: ${{ steps.lint.outputs.result }}
          LINT_DURATION: ${{ steps.lint.outputs.duration_human }}
          UNIT_RESULT: ${{ steps.unit.outputs.result }}
          UNIT_DURATION: ${{ steps.unit.outputs.duration_human }}
          UNIT_PLAYWRIGHT_URL: ${{ steps.unit-playwright-report.outputs.artifact-url }}
          UNIT_ALLURE_URL: ${{ steps.pages.outputs.unit_url }}
          UI_RESULT: ${{ steps.ui.outputs.result }}
          UI_DURATION: ${{ steps.ui.outputs.duration_human }}
          UI_PLAYWRIGHT_URL: ${{ steps.ui-playwright-report.outputs.artifact-url }}
          UI_ALLURE_URL: ${{ steps.pages.outputs.ui_url }}
        with:
          script: |
            const issueNumber = context.payload.pull_request?.number;

            if (!issueNumber) {
              core.setFailed('Pull request number is missing from the event payload.');
              return;
            }

            function formatLinks(playwrightUrl, allureUrl) {
              const links = [];

              if (playwrightUrl) {
                links.push(`[HTML report](${playwrightUrl})`);
              }

              if (allureUrl) {
                links.push(`[Allure report](${allureUrl})`);
              }

              return links.length > 0 ? links.join(' · ') : 'No artifact';
            }

            function formatResult(result) {
              if (result === 'passed') {
                return '✅ Passed';
              }

              if (result === 'failed') {
                return '❌ Failed';
              }

              return '⚪ Unknown';
            }

            const body = [
              '## CI Run Summary',
              '',
              '| Check | Result | Total time execution | Report link |',
              '| --- | --- | --- | --- |',
              `| Typecheck | ${formatResult(process.env.TYPECHECK_RESULT)} | ${process.env.TYPECHECK_DURATION || 'n/a'} | n/a |`,
              `| Lint | ${formatResult(process.env.LINT_RESULT)} | ${process.env.LINT_DURATION || 'n/a'} | n/a |`,
              `| Unit tests | ${formatResult(process.env.UNIT_RESULT)} | ${process.env.UNIT_DURATION || 'n/a'} | ${formatLinks(process.env.UNIT_PLAYWRIGHT_URL, process.env.UNIT_ALLURE_URL)} |`,
              `| UI tests | ${formatResult(process.env.UI_RESULT)} | ${process.env.UI_DURATION || 'n/a'} | ${formatLinks(process.env.UI_PLAYWRIGHT_URL, process.env.UI_ALLURE_URL)} |`,
              '',
              `Run: [#${context.runNumber}](${process.env.RUN_URL})`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
      - name: Fail workflow if a test suite failed
        if: always()
        shell: bash
        env:
          TYPECHECK_CONCLUSION: ${{ steps.typecheck.conclusion }}
          TYPECHECK_EXIT_CODE: ${{ steps.typecheck.outputs.exit_code }}
          LINT_CONCLUSION: ${{ steps.lint.conclusion }}
          LINT_EXIT_CODE: ${{ steps.lint.outputs.exit_code }}
          UNIT_CONCLUSION: ${{ steps.unit.conclusion }}
          UNIT_EXIT_CODE: ${{ steps.unit.outputs.exit_code }}
          UI_CONCLUSION: ${{ steps.ui.conclusion }}
          UI_EXIT_CODE: ${{ steps.ui.outputs.exit_code }}
        run: |
          if [ "$TYPECHECK_CONCLUSION" != "success" ] || [ "$LINT_CONCLUSION" != "success" ] || [ "$UNIT_CONCLUSION" != "success" ] || [ "$UI_CONCLUSION" != "success" ] || [ "${TYPECHECK_EXIT_CODE:-1}" != "0" ] || [ "${LINT_EXIT_CODE:-1}" != "0" ] || [ "${UNIT_EXIT_CODE:-1}" != "0" ] || [ "${UI_EXIT_CODE:-1}" != "0" ]; then
            echo "One or more CI checks failed." >&2
            exit 1
          fi
